<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ideia de Favicon - Vírgula Contábil</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .preview-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
    /* Tamanho 512x512 padrão para ícones de alta resolução */
    .icon-box {
      width: 512px;
      height: 512px;
      background: #022c22; /* Fundo verde muito escuro (tom profissional) */
      border-radius: 110px; /* Formato squircle (cantos bem arredondados) */
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      position: relative;
      overflow: hidden;
    }
    
    /* A vírgula em laranja vibrante */
    .icon-comma {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 650px;
      font-weight: bold;
      color: #f97316; /* Laranja */
      line-height: 0;
      /* Ajustes ópticos para centralizar a vírgula, já que ela fica abaixo da linha de base */
      position: absolute;
      top: 40%;
      left: 52%;
      transform: translate(-50%, -50%);
      text-shadow: 0 20px 30px rgba(0,0,0,0.4);
      z-index: 2;
    }
    
    /* Detalhe de luz verde (Accent) */
    .accent-shape {
      position: absolute;
      width: 450px;
      height: 450px;
      background: linear-gradient(135deg, #10b981 0%, transparent 80%);
      border-radius: 50%;
      top: -120px;
      left: -120px;
      opacity: 0.35;
      z-index: 1;
    }
    
    /* Detalhe de luz laranja na base */
    .accent-shape-2 {
      position: absolute;
      width: 350px;
      height: 350px;
      background: linear-gradient(315deg, #f59e0b 0%, transparent 80%);
      border-radius: 50%;
      bottom: -100px;
      right: -100px;
      opacity: 0.15;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="preview-wrapper">
    <!-- Esta é a área que você pode transformar em imagem (512x512) -->
    <div class="icon-box">
      <div class="accent-shape"></div>
      <div class="accent-shape-2"></div>
      <div class="icon-comma">,</div>
    </div>
    
    <div style="text-align: center;">
      <h2 style="color: #0f172a; margin-bottom: 8px;">Ideia de Favicon: Vírgula Contábil</h2>
      <p style="color: #64748b; margin-top: 0;">Você pode abrir <code>/favicon-idea.html</code> pelo navegador e tirar um print da área acima.</p>
    </div>
  </div>
</body>
</html>
